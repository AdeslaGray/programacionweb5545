<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Área</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h2 class="mb-4">Calculadora de Área de Rectángulo</h2>
  <form id="areaForm">
    <div class="mb-3">
      <label for="base" class="form-label">Base</label>
      <input type="number" class="form-control" id="base" placeholder="Ingresa la base">
    </div>
    <div class="mb-3">
      <label for="altura" class="form-label">Altura</label>
      <input type="number" class="form-control" id="altura" placeholder="Ingresa la altura">
    </div>
    <div class="mb-3">
      <label class="form-label">Área</label>
      <input type="text" class="form-control" id="resultado" readonly>
    </div>
    <button type="button" class="btn btn-primary" onclick="calcularArea()">Calcular</button>
    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/calculadora.js"></script>
</body>
</html>

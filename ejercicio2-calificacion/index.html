<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calificación Final</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h2 class="text-center mb-4">Calculadora de Calificación Final</h2>
    <form id="formulario" class="p-4 bg-white rounded shadow">
      <div class="mb-3">
        <label for="nota1" class="form-label">Nota del 1.er Parcial (máx. 30)</label>
        <input type="number" class="form-control" id="nota1" placeholder="Ej: 25">
      </div>
      <div class="mb-3">
        <label for="nota2" class="form-label">Nota del 2.º Parcial (máx. 30)</label>
        <input type="number" class="form-control" id="nota2" placeholder="Ej: 28">
      </div>
      <div class="mb-3">
        <label for="nota3" class="form-label">Nota del 3.er Parcial (máx. 40)</label>
        <input type="number" class="form-control" id="nota3" placeholder="Ej: 35">
      </div>
      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-primary" onclick="calcular()">Calcular</button>
        <button type="button" class="btn btn-secondary" onclick="limpiar()">Limpiar</button>
      </div>
      <div id="resultado" class="mt-4 text-center fs-5 fw-bold"></div>
    </form>
  </div>
  <script src="js/calificacion.js"></script>
</body>
</html>
